<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>baer1's website</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <div id="version">HTML v2.0</div>
    <script src="/js/donut.js" defer></script>
    <header>
      <span id="header-title">
        baer1
        <!-- Insert better title here later, maybe even a vector text art. -->
      </span>
      <nav id="header-nav">
        <a href="#a">Example link a</a>
        <a href="#b">Example link b</a>
      </nav>
    </header>
    <div id="content">
      <div id="title-card">
        <div id="title-card-bg" class="donut"></div>
        <span id="title-card-content">Lorem ipsum dolor sit amet.</span>
      </div>
      <div id="steam-card">
        <a id="steam-profile">
          <img src="/img/steam_default.jpg" alt="User Avatar" />
          <img
            src="/img/Spinner@1x-1.2s-200px-200px.apng"
            alt="Loading spinner"
          />
          <!-- thx https://loading.io/, you saved me a lot of time -->
          <div>Username</div>
          <div>Name</div>
          <div class="steamstatus"></div>
        </a>
        <button
          onclick="if(!update_steam_profile())alert('Update ratelimited, try again after '+new Date(Number(sessionStorage.getItem('update-steam-time'))+STEAM_UPDATE_RATE_LIMIT).toTimeString())"
          oncontextmenu="if(!update_steam_profile(true))alert('Update ratelimited, try again after '+new Date(Number(sessionStorage.getItem('update-steam-time'))+STEAM_UPDATE_RATE_LIMIT).toTimeString());return false"
        >
          <i>Update live profile (right click for silent mode)</i>
        </button>
        <button onclick="set_steam_status()">Loading</button>
        <button onclick="set_steam_status(null)">Unknown</button>
        <button onclick="set_steam_status(0)">Offline</button>
        <button onclick="set_steam_status(1)">Online</button>
        <button onclick="set_steam_status(2)">Away</button>
        <button onclick="set_steam_status({name: 'Portal', id: 400})">
          Playing Portal
        </button>
      </div>
    </div>
    <script src="/node_modules/ua-parser-js/dist/ua-parser.min.js"></script>
    <script src="/js/index.js"></script>
  </body>
</html>
